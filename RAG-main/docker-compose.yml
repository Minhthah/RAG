version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    volumes:
      - ./server/logs:/app/logs
    restart: unless-stopped

  frontend:
    build: ./ai-dashboard
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:3001
      - VITE_GOOGLE_CLIENT_ID=596735790224-aljdrg900j65ccsud1uufk8rnltvgdo5.apps.googleusercontent.com
    depends_on:
      - backend
    restart: unless-stopped
